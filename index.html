<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BO7 Weekly Challenge Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060c14;--bg2:#08101a;--panel:#0b1622;--card:#0d1a28;--card2:#111f30;
  --bdr:#1a2e42;--bdr2:#243a52;
  --cyan:#00c8e8;--cyan2:#26e0ff;--cyan-d:rgba(0,200,232,.12);
  --gold:#c8a84b;--gold2:#e8c76a;
  --green:#4cdb80;--green-d:rgba(76,219,128,.12);
  --text:#dce8f0;--text2:#8eaabf;--text3:#4a6478;
  --xp:#00aacc;--multi:#e05a5a;--zombies:#8b5acd;--warzone:#c8a84b;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse 80% 50% at 40% -10%,rgba(0,180,220,.06) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 100% 60%,rgba(0,100,160,.04) 0%,transparent 60%);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* TOP CHROME */
.top-chrome{flex-shrink:0;background:linear-gradient(180deg,rgba(0,30,55,.95) 0%,rgba(6,12,20,.92) 100%);border-bottom:1px solid var(--bdr2);backdrop-filter:blur(10px);}
.chrome-inner{display:flex;align-items:stretch;padding:0 20px;gap:0;}
.season-strip{display:flex;align-items:center;gap:4px;padding:6px 16px 6px 0;border-right:1px solid var(--bdr);margin-right:16px;flex-shrink:0;}
.season-strip-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-right:4px;}
.s-chip{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:1px;background:var(--panel);color:var(--text2);border:1px solid var(--bdr);cursor:pointer;transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.s-chip .s-dot{width:5px;height:5px;border-radius:50%;background:var(--bdr2);transition:all .3s;flex-shrink:0;}
.s-chip.sp .s-dot{background:var(--gold);}
.s-chip.sc .s-dot{background:var(--green);box-shadow:0 0 5px rgba(76,219,128,.6);}
.s-chip:hover{background:var(--card2);color:var(--text);}
.s-chip.active{background:var(--cyan-d);color:var(--cyan);border-color:rgba(0,200,232,.35);}
.s-chip .del-s{font-size:11px;color:var(--text3);margin-left:2px;opacity:0;pointer-events:none;transition:opacity .12s;}
.s-chip:hover .del-s{opacity:1;pointer-events:auto;}
.del-s:hover{color:var(--multi)!important;}
.btn-add-s{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:1px;background:transparent;color:var(--text3);border:1px dashed var(--bdr);cursor:pointer;transition:all .14s;}
.btn-add-s:hover{color:var(--cyan);border-color:var(--cyan);}
.week-tabs-chrome{display:flex;align-items:stretch;flex:1;overflow-x:auto;scrollbar-width:none;}
.week-tabs-chrome::-webkit-scrollbar{display:none;}
.wk-tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:0 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;border-right:1px solid var(--bdr);transition:all .14s;white-space:nowrap;flex-shrink:0;min-height:52px;}
.wk-tab:hover{color:var(--text2);background:rgba(0,200,232,.04);}
.wk-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,200,232,.05);}
.wk-tick{font-size:9px;color:var(--green);opacity:0;transition:opacity .2s;line-height:1;}
.wk-tab.wc .wk-tick{opacity:1;}
.wk-tab-sub{font-size:9px;font-weight:600;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.wk-tab.wc .wk-tab-sub{color:var(--green);}
.wk-tab.wp .wk-tab-sub{color:var(--gold);}
.chrome-actions{display:flex;align-items:center;gap:8px;padding:0 0 0 16px;border-left:1px solid var(--bdr);flex-shrink:0;}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border:none;cursor:pointer;transition:all .14s;border-radius:1px;}
.btn-edit{background:transparent;color:var(--gold);border:1px solid rgba(200,168,75,.5);}
.btn-edit:hover{background:rgba(200,168,75,.1);}
.btn-edit.on{background:rgba(200,168,75,.15);color:var(--gold2);}
.btn-save{background:var(--cyan);color:#000;}
.btn-save:hover{background:var(--cyan2);}
.btn-reset{background:transparent;color:var(--text3);border:1px solid var(--bdr);font-size:10px;}
.btn-reset:hover{color:var(--multi);border-color:var(--multi);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* MODE BAR */
.mode-bar{flex-shrink:0;display:flex;align-items:center;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.m-tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 18px;color:var(--text3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .14s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:7px;}
.m-tab:hover{color:var(--text2);}
.m-tab.active[data-m="COOP"]{color:var(--cyan);border-bottom-color:var(--cyan);}
.m-tab.active[data-m="MULTIPLAYER"]{color:var(--multi);border-bottom-color:var(--multi);}
.m-tab.active[data-m="ZOMBIES"]{color:var(--zombies);border-bottom-color:var(--zombies);}
.m-tab.active[data-m="WARZONE"]{color:var(--warzone);border-bottom-color:var(--warzone);}
.m-cnt{font-size:10px;padding:2px 5px;border-radius:1px;background:var(--panel);color:var(--text3);font-weight:700;}
.m-tab.active[data-m="COOP"] .m-cnt{background:rgba(0,200,232,.14);color:var(--cyan);}
.m-tab.active[data-m="MULTIPLAYER"] .m-cnt{background:rgba(224,90,90,.14);color:var(--multi);}
.m-tab.active[data-m="ZOMBIES"] .m-cnt{background:rgba(139,90,205,.14);color:var(--zombies);}
.m-tab.active[data-m="WARZONE"] .m-cnt{background:rgba(200,168,75,.14);color:var(--warzone);}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px 20px;display:flex;flex-direction:column;gap:14px;}
.chl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:700px){.chl-grid{grid-template-columns:1fr;}}

/* CHALLENGE CARD */
.chl{background:var(--card);border:1px solid var(--bdr);display:flex;flex-direction:column;cursor:pointer;transition:border-color .14s,background .14s;position:relative;overflow:hidden;}
.chl:hover:not([data-hv="1"]){border-color:var(--bdr2);}
.chl.done{background:rgba(76,219,128,.05);border-color:rgba(76,219,128,.2);}
.chl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.chl[data-m="COOP"]::before{background:rgba(0,200,232,.5);}
.chl[data-m="MULTIPLAYER"]::before{background:rgba(224,90,90,.5);}
.chl[data-m="ZOMBIES"]::before{background:rgba(139,90,205,.5);}
.chl[data-m="WARZONE"]::before{background:rgba(200,168,75,.5);}
.chl.done::before{background:var(--green)!important;}
.chl-body{display:flex;align-items:flex-start;padding:10px 12px 8px 14px;gap:8px;flex:1;}
.chl-left{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
.chl-txt{font-size:13px;font-weight:500;line-height:1.4;color:var(--text);transition:color .2s;}
.chl.done .chl-txt{color:var(--text3);text-decoration:line-through;text-decoration-color:rgba(74,100,120,.5);}
.val-hi{color:var(--cyan);font-weight:700;}
.chl.done .val-hi{color:var(--green);}
.chl-prog-row{display:flex;align-items:center;justify-content:flex-end;}
.chl-frac{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text2);}
.chl.done .chl-frac{color:var(--green);}
.xp-badge{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;margin-left:4px;}
.xp-hex{width:36px;height:36px;background:var(--card2);border:1px solid var(--bdr2);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.chl.done .xp-hex{background:var(--green-d);border-color:rgba(76,219,128,.3);}
.xp-ico{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;letter-spacing:1px;color:var(--xp);}
.chl.done .xp-ico{color:var(--green);}
.xp-val{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text2);white-space:nowrap;}

/* VALUE PROGRESS */
.chl-val-prog{padding:0 12px 8px 14px;display:flex;flex-direction:column;gap:4px;}
.chl-val-info{display:flex;justify-content:space-between;align-items:center;}
.chl-val-frac{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--cyan);}
.chl.done .chl-val-frac{color:var(--green);}
.chl-val-pct{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--text3);}
.chl-val-ctrls{display:flex;align-items:center;gap:5px;margin-top:2px;}
.vbtn{width:22px;height:22px;background:var(--card2);border:1px solid var(--bdr2);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;border-radius:1px;transition:all .12s;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;line-height:1;}
.vbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.vbtn:active{transform:scale(.92);}
.vnum{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;width:44px;text-align:center;background:var(--card2);border:1px solid var(--bdr2);color:var(--cyan);border-radius:1px;padding:2px 4px;outline:none;}
.vnum:focus{border-color:var(--cyan);}
.vnum::-webkit-inner-spin-button,.vnum::-webkit-outer-spin-button{-webkit-appearance:none;}
.vnum[type=number]{-moz-appearance:textfield;}
.chl-bar{height:3px;background:var(--bg2);}
.chl-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width .35s cubic-bezier(.4,0,.2,1);}
.chl.done .chl-bar-fill{background:linear-gradient(90deg,var(--green),#80ffb0);}

/* EDIT CARD */
.chl.edit-c{cursor:default;padding:10px 12px 10px 14px;background:rgba(14,26,40,.9);}
.chl.edit-c:hover{border-color:var(--bdr);}
.chl-inp{width:100%;background:var(--bg2);border:1px solid var(--bdr2);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:6px 10px;outline:none;border-radius:1px;resize:none;line-height:1.4;transition:border-color .14s;}
.chl-inp:focus{border-color:var(--cyan);}
.edit-hint-sm{font-size:10px;color:var(--text3);margin-top:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.edit-hint-sm em{color:var(--cyan);font-style:normal;}

/* WEEK REWARDS */
.wk-rewards-section{background:var(--bg2);border:1px solid var(--bdr);}
.wk-rew-header{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.wk-rew-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
.wk-rew-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:6px;}
.wk-rew-status.earned{color:var(--gold);}
.wk-rew-status .rew-star{filter:grayscale(1) opacity(.3);transition:filter .3s;}
.wk-rew-status.earned .rew-star{filter:none;}
.wk-rew-body{padding:10px 14px;}
.wk-rew-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.wk-rew-type{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text2);letter-spacing:1px;margin-top:2px;}
.wk-rew-name-edit{background:transparent;border:none;border-bottom:1px solid var(--bdr2);color:var(--cyan);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;outline:none;width:280px;padding:2px 0;}

/* BOTTOM BAR */
.complete-bar{flex-shrink:0;background:var(--panel);border-top:1px solid var(--bdr);padding:8px 20px;display:flex;align-items:center;gap:14px;}
.complete-bar-txt{font-size:12px;color:var(--text2);flex:1;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.complete-bar-txt em{color:var(--cyan);font-style:normal;font-weight:700;}
.cb-frac{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;}
.cb-frac.done{color:var(--green);}
.dots-bar{display:flex;align-items:center;gap:3px;margin-top:4px;}
.dot{width:18px;height:4px;background:var(--bdr2);border-radius:1px;transition:background .2s;flex-shrink:0;}
.dot.filled{background:var(--cyan);}
.dot.filled.done{background:var(--green);}
.cb-xp{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.cb-xp-hex{width:32px;height:32px;background:var(--card);border:1px solid var(--bdr2);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;}
.cb-xp-ico{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:900;color:var(--xp);}
.cb-xp-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text2);}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.sidebar-title{padding:16px 16px 12px;border-bottom:1px solid var(--bdr);background:linear-gradient(180deg,rgba(0,30,55,.6) 0%,transparent 100%);}
.sidebar-title h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--text);display:flex;align-items:center;gap:8px;}
.sidebar-title h2 span{color:var(--cyan);}
.sidebar-sub{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5;}
.rew-tier{border-bottom:1px solid var(--bdr);padding:14px 16px;}
.rew-tier-img{width:100%;height:90px;background:linear-gradient(135deg,#060f1a 0%,#0d1f30 100%);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;position:relative;}
.rew-img-placeholder{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}
.rew-tier-bottom{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.rew-tier-info{flex:1;}
.rew-tier-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px;}
.rew-tier-cond{font-size:11px;color:var(--text2);margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.rew-tier-cond em{color:var(--cyan);font-style:normal;font-weight:700;}
.rew-checks{display:flex;align-items:center;gap:3px;margin-bottom:4px;flex-wrap:wrap;}
.rew-chk{width:18px;height:18px;background:var(--panel);border:1px solid var(--bdr2);border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green);transition:all .2s;flex-shrink:0;}
.rew-chk.filled{background:var(--cyan-d);border-color:rgba(0,200,232,.4);}
.rew-chk.filled .ck-ico{color:var(--cyan);}
.rew-chk.golden{background:rgba(200,168,75,.15);border-color:rgba(200,168,75,.5);}
.rew-chk.golden .ck-ico{color:var(--gold);}
.rew-prog-txt{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text2);margin-left:4px;}
.rew-xp{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.rew-xp-hex{width:38px;height:38px;background:var(--card);border:1px solid var(--bdr2);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;}
.rew-xp-ico{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:900;color:var(--xp);letter-spacing:.5px;}
.rew-xp-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text2);}
.rew-name-inp{background:transparent;border:none;border-bottom:1px solid rgba(0,200,232,.3);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;outline:none;width:100%;padding:1px 0;}
.rew-cond-inp{background:var(--bg2);border:1px solid var(--bdr2);color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.5px;outline:none;width:100%;padding:3px 6px;border-radius:1px;margin-bottom:6px;}
.rew-cond-inp:focus{border-color:var(--cyan);}

/* EDIT FLOAT */
.edit-float{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(11,22,34,.96);border:1px solid var(--gold);color:var(--gold);padding:8px 20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:none;align-items:center;gap:10px;box-shadow:0 6px 30px rgba(0,0,0,.7);z-index:500;white-space:nowrap;}
.edit-float.on{display:flex;animation:fUp .18s ease;}
@keyframes fUp{from{transform:translateX(-50%) translateY(10px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.ep{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:blink 1.1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
.chl.popping .xp-hex{animation:pop .22s ease;}
.sname-inp{background:transparent;border:none;border-bottom:1px solid rgba(0,200,232,.4);color:var(--cyan);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;outline:none;max-width:72px;padding:1px 0;}
.tbd-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:1px 6px;background:rgba(74,100,120,.2);color:var(--text3);border:1px solid var(--bdr);border-radius:1px;margin-left:6px;vertical-align:middle;}

main{max-width:1140px;margin:0 auto 60px;padding:0 24px;position:relative;z-index:1;}
@media(max-width:900px){.sidebar{width:240px;}}
@media(max-width:700px){html,body{overflow:auto;}.layout{flex-direction:column;}.sidebar{width:100%;border-left:none;border-top:1px solid var(--bdr);}}
</style>
</head>
<body>

<div class="top-chrome">
  <div class="chrome-inner">
    <div class="season-strip" id="seasonStrip"></div>
    <div class="week-tabs-chrome" id="weekTabsChrome"></div>
    <div class="chrome-actions">
      <button class="btn btn-reset" onclick="confirmReset()" title="Reset to default challenge data">↺ Reset</button>
      <button class="btn btn-edit" id="editBtn" onclick="toggleEdit()">✏ Edit</button>
      <button class="btn btn-save" id="saveBtn" style="display:none" onclick="saveAll()">✓ Save</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="main-area">
    <div class="mode-bar" id="modeBar"></div>
    <div class="scroll-area" id="scrollArea"></div>
    <div class="complete-bar" id="completeBar"></div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<div class="edit-float" id="editFloat"><div class="ep"></div>EDIT MODE — use [number] for tracked values &nbsp;e.g. "Get [25] kills"</div>

<script>
/* ═══════════════════════════════════════
   CHALLENGE DATA  (real BO7 challenge data)
═══════════════════════════════════════ */
const DEFAULT_SEASONS = [

const MODES=['COOP','MULTIPLAYER','ZOMBIES','WARZONE'];
const ML={COOP:'CO-OP & ENDGAME',MULTIPLAYER:'MULTIPLAYER',ZOMBIES:'ZOMBIES',WARZONE:'WARZONE'};
const WRT=6, KEY='cod_v7';
let editMode=false, AW={}, AM={};

   DATA
═══════════════════════════════════════ */
function buildFromDefaults(){
  const seasons = DEFAULT_SEASONS.map(ds=>{
    const s={
      name:ds.name, s5Name:ds.s5Name, s8Name:ds.s8Name,
      masteryReq:ds.masteryReq, weeks:ds.weeks,
      weekRewards:ds.weekRewards.map(r=>({...r})),
      challenges:{}, progress:{}, vp:{}
    };
    for(let w=0;w<ds.weeks;w++){
      s.challenges[w]={};s.progress[w]={};s.vp[w]={};
      for(const m of MODES){
        s.challenges[w][m]=ds.challenges[w][m].map(c=>({...c}));
        s.progress[w][m]=Array(6).fill(false);
        s.vp[w][m]=Array(6).fill(0);
      }
    }
    return s;
  });
  return {act:0, seasons};
}

function load(){
  try{
    const r=localStorage.getItem(KEY);
    if(r) return JSON.parse(r);
  }catch(e){}
  return buildFromDefaults();
}

let D=load();
// patch missing fields
D.seasons.forEach(s=>{
  if(!s.masteryReq) s.masteryReq=8;
  if(!s.weeks) s.weeks=8;
  if(!s.weekRewards) s.weekRewards=Array.from({length:s.weeks},(_,i)=>({name:`Week ${i+1} Reward`,type:''}));
  for(let w=0;w<s.weeks;w++){
    if(!s.challenges[w]) s.challenges[w]={};
    if(!s.progress[w]) s.progress[w]={};
    if(!s.vp[w]) s.vp[w]={};
    for(const m of MODES){
      if(!s.challenges[w][m]) s.challenges[w][m]=Array.from({length:6},(_,i)=>({text:`Week ${w+1} Challenge ${i+1}`,xp:2500}));
      if(!s.progress[w][m]) s.progress[w][m]=Array(6).fill(false);
      if(!s.vp[w][m]) s.vp[w][m]=Array(6).fill(0);
    }
  }
});

function persist(){localStorage.setItem(KEY,JSON.stringify(D));}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function pv(t){const m=t.match(/\[(\d+)\]/);return m?parseInt(m[1]):null;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(t){return esc(t).replace(/\[(\d+)\]/g,'<span class="val-hi">$1</span>');}
function isTBD(t){return t.includes('TBD')||t.includes('Not Yet Released');}
function wkDone(si,w){let n=0;const s=D.seasons[si];for(const m of MODES)for(let c=0;c<6;c++)if(s.progress[w][m][c])n++;return n;}
function wkEarned(si,w){return wkDone(si,w)>=WRT;}
function weEarned(si){let n=0,s=D.seasons[si];for(let w=0;w<s.weeks;w++)if(wkEarned(si,w))n++;return n;}
function totDone(si){let n=0,s=D.seasons[si];for(let w=0;w<s.weeks;w++)for(const m of MODES)for(let c=0;c<6;c++)if(s.progress[w][m][c])n++;return n;}
function modeDone(si,w,m){return D.seasons[si].progress[w][m].filter(Boolean).length;}

function renderSeasonStrip(si){

    h+=`<div class="s-chip ${cls}${i===si?' active':''}" onclick="setSeason(${i})">

  if(editMode){
    return`<div class="chl edit-c" data-m="${m}">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text2);">Challenges Completed</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--cyan);">${td} / ${totalChlCount}</span>
      </div>
      <div style="height:3px;background:var(--panel);border-radius:1px;overflow:hidden;margin-bottom:10px;">
        <div style="height:100%;width:${Math.round(td/totalChlCount*100)}%;background:linear-gradient(90deg,var(--cyan),var(--cyan2));transition:width .4s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text2);">Weekly Rewards Earned</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:${we>=mr?'var(--gold)':we>=5?'var(--cyan)':'var(--text2)'};">${we} / ${mr}</span>
      </div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;">
        ${Array.from({length:s.weeks},(_,w)=>{
          const e=wkEarned(si,w);
          return`<div style="flex:1;min-width:12px;height:4px;border-radius:1px;background:${e?'var(--green)':'var(--bdr2)'};transition:background .3s;" title="Week ${w+1}"></div>`;
        }).join('')}
      </div>
    </div>`;
}

/* ═══════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════ */
function tog(si,w,m,c){
  D.seasons[si].progress[w][m][c]=!D.seasons[si].progress[w][m][c];
  persist();
  const el=document.getElementById(`ch-${si}-${w}-${m}-${c}`);
  if(el){el.classList.add('popping');setTimeout(()=>el.classList.remove('popping'),300);}
  render();
}
function adj(si,w,m,c,d,e){
  e.stopPropagation();
  const s=D.seasons[si],max=pv(s.challenges[w][m][c].text);if(!max)return;
  let cur=Math.max(0,Math.min(max,(s.vp[w][m][c]||0)+d));
  s.vp[w][m][c]=cur;s.progress[w][m][c]=(cur>=max);
  persist();render();
}
function setV(si,w,m,c,val,e){
  e.stopPropagation();
  const s=D.seasons[si],max=pv(s.challenges[w][m][c].text);if(!max)return;
  let cur=Math.max(0,Math.min(max,parseInt(val)||0));
  s.vp[w][m][c]=cur;s.progress[w][m][c]=(cur>=max);
  persist();render();
}
function setSeason(si){D.act=si;render();}
function setWeek(si,w){AW[si]=w;render();}
function setMode(si,w,m){AM[`${si}-${w}`]=m;render();}
function addSeason(){
  const n=D.seasons.length+1;
  const ns=buildFromDefaults().seasons[0];
  ns.name=`Season ${n}`;
  D.seasons.push(ns);
  D.act=D.seasons.length-1;
  persist();render();
}
function delSeason(si,e){
  e.stopPropagation();
  if(D.seasons.length<=1)return;
  if(!confirm(`Delete "${D.seasons[si].name}"? All progress will be lost.`))return;
  D.seasons.splice(si,1);if(D.act>=D.seasons.length)D.act=D.seasons.length-1;
  persist();render();
}
function toggleEdit(){
  editMode=!editMode;
  const b=document.getElementById('editBtn'),sv=document.getElementById('saveBtn'),f=document.getElementById('editFloat');
  b.textContent=editMode?'✕ Cancel':'✏ Edit';
  b.className=editMode?'btn btn-edit on':'btn btn-edit';
  sv.style.display=editMode?'block':'none';
  f.className=editMode?'edit-float on':'edit-float';
  render();
}
function saveAll(){
  document.querySelectorAll('[id^="i-"]').forEach(el=>{
    const p=el.id.slice(2).split('-');
    const si=+p[0],w=+p[1],m=p[2],c=+p[3];
    const om=pv(D.seasons[si].challenges[w][m][c].text);
    D.seasons[si].challenges[w][m][c].text=el.value;
    const nm=pv(el.value);
    if(nm!==om){D.seasons[si].vp[w][m][c]=0;if(!nm)D.seasons[si].progress[w][m][c]=false;}
  });
  persist();editMode=false;
  document.getElementById('editBtn').textContent='✏ Edit';
  document.getElementById('editBtn').className='btn btn-edit';
  document.getElementById('saveBtn').style.display='none';
  document.getElementById('editFloat').className='edit-float';
  render();
}
function confirmReset(){
  if(!confirm('Reset all challenge data to defaults? This will clear all progress and custom edits.'))return;
  localStorage.removeItem(KEY);
  D=buildFromDefaults();
  AW={};AM={};
  render();
}

render();
</script>
</body>
</html>
